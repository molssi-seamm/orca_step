# Configuration options for how to run ORCA
#
# ORCA is licensed software you install yourself (https://www.faccts.de). This
# file records WHERE it is and HOW to launch it. The user-configurable run
# options (ncores, memory) live in the [orca-step] section of the main SEAMM
# configuration file (~/.seamm.d/seamm.ini), not here.

[local]
# The type of local installation. Options: conda, modules, local, docker.
# ORCA is normally installed by hand, so 'local'.
installation = local

# The command line to run ORCA -- normally the FULL PATH to the 'orca'
# executable, since ORCA must be invoked by its full path to find its
# sub-programs. Variables in braces {} are expanded. For example:
#   code = /Users/me/orca_6_1_1/orca
code = orca

# Directory holding the OpenMPI libraries ORCA was built against, for parallel
# runs (%pal). ORCA 6.1 requires OpenMPI 4.1.x and does NOT support 5.x. On
# macOS, ORCA does not pass DYLD_* to its MPI sub-processes, so in addition the
# libraries must be on the default loader path -- e.g. symlink libmpi.*.dylib
# into /usr/local/lib (a one-time setup). For example:
#   library-path = /Users/me/miniconda3/envs/orca-mpi/lib
# library-path =

[docker]
# Run ORCA from a Docker container instead of a local install. 'code' is the
# command inside the container; 'container' names the image (optionally with
# {version}, which expands to the plug-in version).
code = orca
# container = ghcr.io/molssi-seamm/seamm-orca:{version}

# On Apple silicon you may need to force the platform if the image is amd64-only:
# platform = linux/amd64
